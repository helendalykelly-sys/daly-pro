    // Dynamic manifest — works on all platforms without base64 encoding issues
    const manifest = {
        name: "Daly Pro Driver Intelligence",
        short_name: "Daly Pro",
        description: "Professional driver intelligence and route planning for luxury touring in Ireland.",

        ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = URL.createObjectURL(manifestBlob);
    document.head.appendChild(manifestLink);
    </script>

    <!-- ===== FIREBASE MODULE ===== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        let db = null, auth = null, appId = 'daly-pro-driver-suite';
        window.isCloudActive = false;
        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'daly-pro-driver-suite';
                window.isCloudActive = true;
            }
        } catch (e) { console.error("Cloud init skipped:", e); }
        window.saveJourney = async (journeyData) => {
            if (!db) return;
            try {
                if (!auth.currentUser) await signInAnonymously(auth);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'journeys'), {
                    ...journeyData, createdAt: serverTimestamp()
                });
            } catch (err) { console.error("Cloud storage failed:", err); }
        };
        if (window.isCloudActive) {
            onAuthStateChanged(auth, (user) => {
                if (user && window.renderArchive) startArchiveSync();
            });
            const startArchiveSync = () => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'journeys'));
                onSnapshot(q, (snapshot) => {
                    const journeys = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (window.renderArchive) window.renderArchive(journeys);
                }, (err) => console.error("Sync error:", err));
            };
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                } catch (e) { console.error("Auth error", e); }
            };
            initAuth();
        } else {
            setTimeout(() => { if (window.renderArchive) window.renderArchive([]); }, 1000);
        }
    </script>

    function showInstallBanner() {
        if (document.getElementById('install-banner')) return;
        const banner = document.createElement('div');

    async function triggerInstall() {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        const result = await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;

    function dismissInstall() {
        const banner = document.getElementById('install-banner');
        if (banner) banner.remove();
    }

    // Detect standalone mode (already installed)
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    window.addEventListener('appinstalled', () => { dismissInstall(); });

    // ========================================

    let map, activeRouteLine, lastSelectedLoc, selectedImages = [], activeBriefingType = null;
    const markers = [];
    let briefingStore = {};
    let currentJob = null;

    // Load persisted briefings from localStorage
    try {
        const saved = localStorage.getItem('dalyPro_briefings');
        if (saved) briefingStore = JSON.parse(saved);
    } catch(e) {}

    function saveBriefingStore() {

    const fetchWithRetry = async (url, options, maxRetries = 5) => {
        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (response.ok) return await response.json();
                if (response.status === 429 || response.status >= 500) {
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                    continue;
                }
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `API Error ${response.status}`);
            } catch (err) {
                if (i === maxRetries - 1) throw err;
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
        }
        throw new Error("Connection failed after retries");
    };

    async function compressImage(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSize = 1200;
                let width = img.width, height = img.height;
                if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                canvas.width = width; canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
            };
            img.src = dataUrl;
        });
    }

    async function handlePhotoSelection(event) {
        const files = Array.from(event.target.files);

        for (const file of files) {

            const base64 = await compressImage(dataUrl);
            selectedImages.push({ data: base64, mimeType: "image/jpeg" });
        }
        countLabel.innerText = `${files.length} image${files.length > 1 ? 's' : ''} ready`;
        document.getElementById('process-btn').disabled = false;
        document.getElementById('process-btn').style.opacity = "1";

    function initMap() {

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

        setTimeout(() => map.invalidateSize(), 500);

    function plotRoute(stops) {
        markers.forEach(m => map.removeLayer(m));
        markers.length = 0;
        if (activeRouteLine) map.removeLayer(activeRouteLine);
        const coords = stops.map(s => {
            const marker = L.marker([s.lat, s.lng]).addTo(map);
            marker.on('click', (e) => { L.DomEvent.stopPropagation(e); showPanel(s); });
            markers.push(marker);
            return [s.lat, s.lng];
        });
        activeRouteLine = L.polyline(coords, { color: '#10b981', weight: 6, opacity: 0.8, dashArray: '10, 10' }).addTo(map);
        map.fitBounds(activeRouteLine.getBounds().pad(0.5));
        if (stops.length > 0) showPanel(stops[0]);
    }

    function formatAiResponse(text) {
        return text.split('\n').map(line => {
            line = line.trim();
            if (!line) return '';
            // Markdown headings
            if (line.match(/^#{1,3}\s/)) {
                return `<h4 class="font-black text-emerald-900 uppercase text-[12px] mt-5 mb-1 tracking-wide">${line.replace(/^#+\s/, '').replace(/\*\*/g, '')}</h4>`;
            }
            // ALL-CAPS headings with colon
            if (line.match(/^[A-Z][A-Z\s&\/]+:/)) {
                return `<h4 class="font-black text-emerald-900 uppercase text-[12px] mt-5 mb-1 tracking-wide">${line.replace(/\*\*/g, '')}</h4>`;
            }
            // Bold headings
            if (line.match(/^\*\*[^*]+\*\*:?\s*$/)) {
                return `<h4 class="font-black text-emerald-900 text-[12px] mt-5 mb-1 tracking-wide">${line.replace(/\*\*/g, '')}</h4>`;
            }
            // Bullet points
            if (line.match(/^[-•*]\s/)) {
                const content = line.replace(/^[-•*]\s/, '').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                return `<div class="flex gap-2 ml-2 mb-1"><span class="text-emerald-500 mt-0.5">&#x2022;</span><span>${content}</span></div>`;
            }
            // Numbered items
            if (line.match(/^\d+\.\s/)) {
                const content = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                return `<div class="ml-2 mb-1">${content}</div>`;
            }
            // Regular paragraph
            const content = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            return `<p class="mb-2">${content}</p>`;
        }).join('');
    }

    function compileBriefing(locName) {

        let text = `LOCATION BRIEFING: ${locName.toUpperCase()}\n${'='.repeat(50)}\n\n`;
        const sections = {
            brief: 'OPERATIONAL BRIEF',
            history: 'HISTORICAL CONTEXT',
            access: 'TERRAIN & ACCESS',
            heritage: 'CULTURAL HERITAGE',
            gaelic: 'IRISH LANGUAGE',
            announcement: 'PA ANNOUNCEMENT',
            photo: 'PHOTO OPPORTUNITIES',
            rural: 'RURAL INTELLIGENCE'
        };
        for (const [key, label] of Object.entries(sections)) {
            if (data[key]) {
                text += `${label}\n${'-'.repeat(40)}\n${data[key]}\n\n`;
            }
        }
        if (data.notes) {
            text += `DRIVER NOTES\n${'-'.repeat(40)}\n${data.notes}\n\n`;
        }
        return text;
    }

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' });
        let text = `DALY PRO — ROUTE BRIEFING PACK\n${'='.repeat(50)}\n`;
        text += `Generated: ${dateStr}\n`;
        if (currentJob) {
            text += `Client: ${currentJob.title || 'N/A'}\n`;
            if (currentJob.pax) text += `Group Size: ${currentJob.pax} Pax\n`;
            if (currentJob.dates) text += `Dates: ${currentJob.dates}\n`;
            if (currentJob.vehicle) text += `Vehicle: ${currentJob.vehicle}\n`;
            if (currentJob.specialRequirements) text += `Requirements: ${currentJob.specialRequirements}\n`;
            if (currentJob.mealBookings) text += `Meal Bookings: ${currentJob.mealBookings}\n`;
        }
        text += `\n${'='.repeat(50)}\n\n`;

        const stops = currentJob?.stops || nicoleBaseline.stops;
        stops.forEach((stop, i) => {
            text += `STOP ${i + 1}: ${stop.name.toUpperCase()}`;
            if (stop.day) text += ` (Day ${stop.day})`;
            text += `\n${'-'.repeat(50)}\n`;
            if (stop.info) text += `Logistics: ${stop.info}\n`;
            if (stop.time) text += `Time: ${stop.time}\n`;
            if (stop.duration) text += `Duration: ${stop.duration}\n`;
            if (stop.bookingRef) text += `Booking Ref: ${stop.bookingRef}\n`;
            text += '\n';

            if (briefingStore[stop.name]) {
                text += compileBriefing(stop.name);
            } else {
                text += 'No briefing data generated for this stop.\n\n';
            }
            text += '\n';
        });
        text += `${'='.repeat(50)}\nEND OF BRIEFING PACK\nDaly Pro — Professional Driver Intelligence\n`;
        return text;
    }

                if (navigator.share) {
                    try {
                        await navigator.share({ title, text });
                    } catch(e) {
                        if (e.name !== 'AbortError') await executeShare('copy', title, text);
                    }
                } else {
                    await executeShare('copy', title, text);
                }
                break;
            case 'sms':
                // Truncate for SMS if extremely long, suggest download for full version
                const smsText = text.length > 1500
                    ? text.substring(0, 1400) + '\n\n[Briefing truncated — download full version from the app]'
                    : text;
                window.open(`sms:${DRIVER_PHONE}${SMS_SEPARATOR}${encodeURIComponent(smsText)}`);
                break;
            case 'whatsapp':
                const waText = text.length > 4000
                    ? text.substring(0, 3900) + '\n\n[Truncated — download full version from the app]'
                    : text;
                window.open(`https://wa.me/${DRIVER_PHONE_INTL}?text=${encodeURIComponent(waText)}`);
                break;
            case 'copy':
                try {
                    await navigator.clipboard.writeText(text);
                    showToast('Copied to clipboard');
                } catch(e) {
                    // Fallback
                    const ta = document.createElement('textarea');
                    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
                    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('Copied to clipboard');
                }
                break;
            case 'download':
                const safeTitle = title.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '-').toLowerCase();
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${safeTitle}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('File saved');
                break;
        }
    }

    function showToast(message) {
        const existing = document.getElementById('toast-msg');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'toast-msg';
        toast.className = 'fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[30000] transition-opacity';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
    }

    // ========================================
    // ARCHIVE RENDERING
    // ========================================
    window.renderArchive = (cloudJourneys) => {
        const list = document.getElementById('archive-list');
        list.innerHTML = "";

        // Baseline card
        const bCard = document.createElement('div');
        bCard.className = "day-card bg-slate-950 text-white p-6 rounded-[2.5rem] border-l-8 border-emerald-500 shadow-2xl mb-6";
        bCard.innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-black text-lg">${nicoleBaseline.title}</h3>
                <span class="bg-emerald-600 text-[8px] font-black px-2 py-1 rounded uppercase tracking-widest">Active Route</span>
            </div>
            <p class="text-slate-400 text-[10px] font-bold mb-4">${nicoleBaseline.stops.length} stops — ${nicoleBaseline.pax} Pax</p>
            <button onclick="event.stopPropagation(); currentJob = nicoleBaseline; plotRoute(nicoleBaseline.stops); toggleSidebar();" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Load Route</button>`;
        list.appendChild(bCard);

        cloudJourneys.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).forEach(j => {
            const card = document.createElement('div');
            card.className = "day-card bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm mb-4";
            const details = [];
            if (j.pax) details.push(`${j.pax} Pax`);
            if (j.dates) details.push(j.dates);
            details.push(`${j.stops?.length || 0} stops`);
            card.innerHTML = `
                <h3 class="font-bold text-slate-800 mb-1">${j.title || 'Imported Job'}</h3>
                <p class="text-[9px] text-slate-400 font-bold mb-1">${details.join(' — ')}</p>
                ${j.specialRequirements ? `<p class="text-[9px] text-amber-600 font-bold mb-3">${j.specialRequirements}</p>` : '<div class="mb-3"></div>'}
                <button class="w-full py-2 bg-slate-100 text-emerald-600 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-all">Load Route</button>`;
            card.onclick = () => { currentJob = j; plotRoute(j.stops); toggleSidebar(); };
            list.appendChild(card);
        });
    };

    // ========================================
    // UI CONTROLS
    // ========================================
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    function goHome() {
        closePanel();
        if (map) map.setView([52.8, -8.5], 7);
    }
    function openScanner() { document.getElementById('scan-modal').classList.remove('hidden'); }
    function closeScanner() {
        document.getElementById('scan-modal').classList.add('hidden');
        selectedImages = [];
        document.getElementById('photo-count').innerText = "Images compressed for processing.";
        document.getElementById('process-btn').disabled = true;
        document.getElementById('process-btn').style.opacity = "0.5";
        document.getElementById('process-btn').innerText = "Awaiting Documentation...";
    }
    function closePanel() { document.getElementById('location-panel').classList.replace('panel-visible', 'panel-hidden'); }
    function togglePanel() {
        const p = document.getElementById('location-panel');
        p.classList.contains('panel-hidden') ? p.classList.replace('panel-hidden', 'panel-visible') : closePanel();
    }

    // ========================================
    // SERVICE WORKER & INITIALISE
    // ========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then((reg) => {
                console.log('Service worker registered:', reg.scope);
                // Check for updates periodically
                setInterval(() => reg.update(), 60 * 60 * 1000);
            }).catch((err) => {
                console.log('Service worker registration skipped:', err.message);
            });
        });
    }

    // iOS install hint (iOS has no beforeinstallprompt event)
    function checkIOSInstallHint() {
        if (isIOS && !isStandalone && !sessionStorage.getItem('iosHintShown')) {
            sessionStorage.setItem('iosHintShown', '1');
            setTimeout(() => {
                const hint = document.createElement('div');
                hint.id = 'ios-install-hint';
                hint.className = 'fixed bottom-4 left-4 right-4 bg-slate-900 text-white p-5 rounded-2xl z-[30000] shadow-2xl flex items-start gap-3';
                hint.innerHTML = `
                    <div class="text-3xl">📲</div>
                    <div class="flex-1">
                        <p class="font-black text-sm mb-1">Install Daly Pro</p>
                        <p class="text-[11px] text-slate-300 leading-snug">Tap <strong>Share</strong> <span class="inline-block w-4 h-4 align-middle text-center bg-white/20 rounded text-[10px] leading-4">↑</span> then <strong>"Add to Home Screen"</strong> for full-screen access.</p>
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-slate-400 text-xl leading-none">&times;</button>`;
                document.body.appendChild(hint);
                setTimeout(() => { if (document.getElementById('ios-install-hint')) hint.remove(); }, 15000);
            }, 3000);
        }
    }

    window.onload = () => {
        initMap();
        checkIOSInstallHint();
    };
    </script>
